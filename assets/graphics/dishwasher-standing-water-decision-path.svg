<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Decision path for dishwasher standing water after cycle</title>
  <desc id="desc">Flowchart showing the safest homeowner checks for dishwasher standing water after a cycle: remove water, inspect filter area, branch to sink-side path if filter is clean, and call service when leaks, grinding, or repeated failure remain.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2230"/>
      <stop offset="100%" stop-color="#08131d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123245"/>
      <stop offset="100%" stop-color="#0c1b28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18e299"/>
      <stop offset="100%" stop-color="#0fa968"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8cf5cf"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="36" fill="url(#bg)"/>
  <text x="70" y="86" fill="#f3fbff" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Dishwasher standing water: safe decision path</text>
  <text x="70" y="124" fill="#9bb1c1" font-family="Inter, Arial, sans-serif" font-size="22">Use symptom timing to separate routine drain-path maintenance from problems that should be handed off to service.</text>

  <rect x="70" y="180" width="280" height="170" rx="26" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="100" y="226" fill="#042116" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">STEP 1</text>
  <text x="100" y="270" fill="#04110c" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Remove pooled water</text>
  <text x="100" y="312" fill="#083222" font-family="Inter, Arial, sans-serif" font-size="20">Scoop and towel-dry the tub so the</text>
  <text x="100" y="340" fill="#083222" font-family="Inter, Arial, sans-serif" font-size="20">filter well and sump opening are visible.</text>

  <rect x="460" y="180" width="280" height="170" rx="26" fill="url(#card)" stroke="#2bd79b" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="226" fill="#8cf5cf" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">STEP 2</text>
  <text x="490" y="270" fill="#f3fbff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Inspect filter area</text>
  <text x="490" y="312" fill="#cfe0eb" font-family="Inter, Arial, sans-serif" font-size="20">Food scraps, labels, grease film, and</text>
  <text x="490" y="340" fill="#cfe0eb" font-family="Inter, Arial, sans-serif" font-size="20">sludge point to a slowed drain path.</text>

  <rect x="850" y="180" width="280" height="170" rx="26" fill="url(#card)" stroke="#2bd79b" stroke-width="2" filter="url(#shadow)"/>
  <text x="880" y="226" fill="#8cf5cf" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">STEP 3</text>
  <text x="880" y="270" fill="#f3fbff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Branch by clue</text>
  <text x="880" y="312" fill="#cfe0eb" font-family="Inter, Arial, sans-serif" font-size="20">Dirty debris = filter path first.</text>
  <text x="880" y="340" fill="#cfe0eb" font-family="Inter, Arial, sans-serif" font-size="20">Clean filter = hose, sink, air gap, disposal.</text>

  <path d="M350 265 H440" stroke="#8cf5cf" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M740 265 H830" stroke="#8cf5cf" stroke-width="6" fill="none" marker-end="url(#arrow)"/>

  <rect x="90" y="450" width="300" height="200" rx="24" fill="#102533" stroke="#2b4f63" stroke-width="2"/>
  <text x="120" y="495" fill="#f3fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Likely maintenance case</text>
  <text x="120" y="535" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Dirty water with food particles</text>
  <text x="120" y="565" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Clogged filter well or air gap</text>
  <text x="120" y="595" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Hose kink or recent disposal work</text>
  <text x="120" y="625" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Slow sink drain during dishwasher use</text>

  <rect x="450" y="450" width="300" height="200" rx="24" fill="#102533" stroke="#2b4f63" stroke-width="2"/>
  <text x="480" y="495" fill="#f3fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Move to sink-side checks</text>
  <text x="480" y="535" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Filter already clean</text>
  <text x="480" y="565" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Water returns after partial draining</text>
  <text x="480" y="595" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Backup appears in sink or air gap</text>
  <text x="480" y="625" fill="#d5e8f2" font-family="Inter, Arial, sans-serif" font-size="20">• Disposal replaced recently</text>

  <rect x="810" y="450" width="300" height="200" rx="24" fill="#3b1e14" stroke="#ffb36b" stroke-width="2"/>
  <text x="840" y="495" fill="#fff4e8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Stop and book service</text>
  <text x="840" y="535" fill="#ffe3c6" font-family="Inter, Arial, sans-serif" font-size="20">• Grinding, humming, or leaking</text>
  <text x="840" y="565" fill="#ffe3c6" font-family="Inter, Arial, sans-serif" font-size="20">• Repeated drain errors</text>
  <text x="840" y="595" fill="#ffe3c6" font-family="Inter, Arial, sans-serif" font-size="20">• Breaker trips or electrical concerns</text>
  <text x="840" y="625" fill="#ffe3c6" font-family="Inter, Arial, sans-serif" font-size="20">• Next step requires disassembly</text>
</svg>