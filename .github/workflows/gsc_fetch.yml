name: GSC Fetch and Report

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Restore service account key from secret
        run: |
          mkdir -p ~/.hermes/profiles/adsense/credentials
          printf "%s" "${{ secrets.SEARCH_CONSOLE_SA_JSON }}" > ~/.hermes/profiles/adsense/credentials/searchconsole-service-account.json
          chmod 600 ~/.hermes/profiles/adsense/credentials/searchconsole-service-account.json

      - name: Run GSC fetcher
        run: |
          python scripts/gsc_fetch.py

      - name: Upload Performance outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-performance-outputs
          path: Performance/**
